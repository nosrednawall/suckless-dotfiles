# Arquivos e diretórios
db_file			"~/.config/mpd/mpd.db"
log_file		"/tmp/mpd.log"
log_level		"default"
music_directory	"~/Músicas/"
pid_file		"/tmp/mpd.pid"
state_file		"~/.config/mpd/mpdstate"

# Configurações de áudio - essenciais para seu problema
mixer_type		"software"
buffer_before_play	"10%"
audio_buffer_size	"4096"

# Saída PulseAudio (CORRIGIDA)
audio_output {
    type		"pulse"
    name		"pulse audio"
    mixer_type		"software"
    buffer_time		"50000"
    period_time		"10000"
}

# FIFO para visualização
audio_output {
    type		"fifo"
    name		"my_fifo"
    path		"/tmp/mpd.fifo"
    format		"44100:16:2"
}

# Bind e porta
bind_to_address		"127.0.0.1"
port			"6600"
