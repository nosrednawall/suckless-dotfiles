    animations = (

        {
            triggers = ["close"];
            opacity = {
                curve = "cubic-bezier(0,1,1,1)";
                duration = 0.3;
                start = "window-raw-opacity-before";
                end = 0;
            };

            blur-opacity = "opacity";
            shadow-opacity = "opacity";

            scale-x = {
                curve = "cubic-bezier(0,1.3,1,1)";
                duration = 0.3;
                start = 1;
                end = 0.6;
            };

            scale-y = "scale-x";
            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";

            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        },

        {
            triggers = ["open"];
            opacity = {
                curve = "cubic-bezier(0,1,1,1)";
                duration = 0.5;
                start = 0;
                end = "window-raw-opacity";
            };

            blur-opacity = "opacity";
            shadow-opacity = "opacity";

            scale-x = {
                curve = "cubic-bezier(0,1.3,1,1)";
                duration = 0.5;
                start = 0.6;
                end = 1;
            };

            scale-y = "scale-x";
            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";

            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        },
{
    triggers = ["show"];
    opacity = {
        curve = "cubic-bezier(0,1,1,1)";
        duration = 0.4;
        start = 0;
        end = "window-raw-opacity";
    };

    blur-opacity = "opacity";
    shadow-opacity = "opacity";

    # Desliza de cima
    offset-y = {
        curve = "cubic-bezier(0.34, 1.56, 0.64, 1)";  # Com bounce
        duration = 0.5;
        start = "-window-height";
        end = 0;
    };
},
{
    triggers = ["hide"];
    opacity = {
        curve = "cubic-bezier(0,1,1,1)";
        duration = 0.25;
        start = "window-raw-opacity-before";
        end = 0;
    };

    blur-opacity = "opacity";
    shadow-opacity = "opacity";

    # Desliza para baixo
    offset-y = {
        curve = "cubic-bezier(0,1,1,1)";
        duration = 0.25;
        start = 0;
        end = "window-height";
    };
}
    )
