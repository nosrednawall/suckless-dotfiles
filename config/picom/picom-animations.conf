# Animations for NORMAL windows (estilo Niri - SUAVE E REFINADO)
{
    match = "window_type = 'normal'";
    animations = (
        # FECHAR/ESCONDER - fade suave + encolhimento gradual
        {
            triggers = ["close", "hide"];
            opacity = {
                curve = "ease-in-out";
                duration = 0.25;
                start = "window-raw-opacity-before";
                end = 0;
            };
            blur-opacity = "opacity";
            shadow-opacity = "opacity";
            scale-x = {
                curve = "ease-in-out";
                duration = 0.25;
                start = 1;
                end = 0.85;
            };
            scale-y = "scale-x";
            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";
            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        },
        # ABRIR/MOSTRAR - pop suave com overshoot controlado
        {
            triggers = ["open", "show"];
            opacity = {
                curve = "ease-out";
                duration = 0.3;
                start = 0;
                end = "window-raw-opacity";
            };
            blur-opacity = "opacity";
            shadow-opacity = "opacity";
            scale-x = {
                curve = "cubic-bezier(0.34, 1.3, 0.64, 1)";
                duration = 0.35;
                start = 0.7;
                end = 1;
            };
            scale-y = "scale-x";
            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";
            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        },
        # REDIMENSIONAMENTO - transição fluida
        {
            triggers = ["geometry"];
            scale-x = {
                curve = "ease-out";
                duration = 0.3;
                start = "window-width-before / window-width";
                end = 1;
            };
            scale-y = {
                curve = "ease-out";
                duration = 0.3;
                start = "window-height-before / window-height";
                end = 1;
            };
            offset-x = {
                curve = "ease-out";
                duration = 0.3;
                start = "window-x-before - window-x";
                end = 0;
            };
            offset-y = {
                curve = "ease-out";
                duration = 0.3;
                start = "window-y-before - window-y";
                end = 0;
            };
            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        }
    );
},

